[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# -v : テストケース名をターミナルに表示（PASSED / FAILED 付き）
# --ignore=e2e_tests : ユニットテスト実行時に E2E を除外
# E2E テストを実行する場合: pytest e2e_tests/ --browser chromium -v
addopts = -v --ignore=e2e_tests